<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Climate Action | Welcome</title>
    <meta
      name="description"
      content="Intro splash screen for the Climate Action campaign website."
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Splash Page Styles */
      body {
        min-height: 100vh;
        background:
          linear-gradient(
            120deg,
            rgba(14, 163, 116, 0.5),
            rgba(19, 60, 49, 0.608)
          ),
          url("Images/splash1.avif") center/cover no-repeat;
        color: white;
      }

      .splash-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      .splash-card {
        width: min(720px, 100%);
        padding: 2.2rem;
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.22);
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.22);
        text-align: center;
      }

      .loader {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        overflow: hidden;
        margin: 1.2rem 0;
      }

      .loader > span {
        display: block;
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, var(--accent), white);
        transition: width 400ms ease;
      }

      .skip-btn {
        margin-top: 1rem;
        background: rgba(255, 255, 255, 0.16);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <main class="splash-screen">
      <section class="splash-card" aria-labelledby="splash-title">
        <p class="hero-badge">GreenSteps</p>
        <h1 id="splash-title">The future is built by small actions.</h1>
        <p>
          Preparing an immersive experience for SDG 13. You will be redirected
          in just a moment.
        </p>
        <div class="loader" aria-label="Loading progress">
          <span id="loaderBar"></span>
        </div>
        <p id="countdown">4</p>
        <a class="btn skip-btn" href="home.html">Skip Intro</a>
      </section>
    </main>

    <script>
      // Countdown and redirect to the home page.
      const loaderBar = document.getElementById("loaderBar");
      const countdown = document.getElementById("countdown");
      let remaining = 4;
      const timer = setInterval(() => {
        remaining -= 1;
        countdown.textContent = remaining;
        loaderBar.style.width = `${((4 - remaining) / 4) * 100}%`;
        if (remaining <= 0) {
          clearInterval(timer);
          window.location.href = "home.html";
        }
      }, 1000);
    </script>
  </body>
</html>
